<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE"/>
      <stop offset="100%" style="stop-color:#67E8F9"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Main Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)"/>

  <!-- Hexagon Framework -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <!-- Outer hexagon -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30"
             fill="none"
             stroke="url(#accentGradient)"
             stroke-width="3"
             stroke-linecap="round"/>

    <!-- Inner hexagon -->
    <polygon points="0,-35 30,-17.5 30,17.5 0,35 -30,17.5 -30,-17.5"
             fill="none"
             stroke="#60A5FA"
             stroke-width="2"
             stroke-opacity="0.6"/>

    <!-- Connection lines -->
    <line x1="-52" y1="-30" x2="0" y2="-35" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="52" y1="-30" x2="0" y2="-35" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="52" y1="30" x2="30" y2="17.5" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="-52" y1="30" x2="-30" y2="17.5" stroke="#22D3EE" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="0" y2="35" stroke="#22D3EE" stroke-width="1.5"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="12" fill="#22D3EE"/>
    <circle cx="0" cy="0" r="8" fill="#0F172A"/>
    <circle cx="0" cy="0" r="4" fill="#22D3EE">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Outer nodes -->
    <circle cx="0" cy="-60" r="6" fill="#67E8F9"/>    <!-- Top -->
    <circle cx="52" cy="-30" r="6" fill="#67E8F9"/>   <!-- Top-right -->
    <circle cx="52" cy="30" r="6" fill="#67E8F9"/>    <!-- Bottom-right -->
    <circle cx="0" cy="60" r="6" fill="#67E8F9"/>     <!-- Bottom -->
    <circle cx="-52" cy="30" r="6" fill="#67E8F9"/>   <!-- Bottom-left -->
    <circle cx="-52" cy="-30" r="6" fill="#67E8F9"/>  <!-- Top-left -->

    <!-- Type Safety Badge -->
    <circle cx="70" cy="-70" r="20" fill="#10B981" stroke="#10B981" stroke-width="2" filter="url(#glow)"/>
    <text x="70" y="-65" text-anchor="middle" fill="white" font-size="10" font-weight="bold" font-family="system-ui, sans-serif">TS</text>
  </g>

  <!-- Text for clarity -->
  <text x="100" y="185" text-anchor="middle" fill="#94A3B8" font-size="11" font-weight="500" font-family="system-ui, sans-serif" letter-spacing="3">KINETIC</text>
</svg>