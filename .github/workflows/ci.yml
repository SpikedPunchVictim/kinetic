name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test packages
        # Run tests only for published packages — examples are excluded because
        # some contain pre-existing integration test failures unrelated to CI.
        run: pnpm --filter "./packages/**" test
